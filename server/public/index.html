  <!-- React code -->
  <script type="text/babel">
    const { useState, useEffect, useRef, createContext, useContext } = React;

    const API_BASE = '/api';

    const getHeaders = () => {
      const headers = { 'Content-Type': 'application/json' };
      const token = localStorage.getItem('token');
      if (token) headers['Authorization'] = `Bearer ${token}`;
      return headers;
    };

    const api = {
      get: async (endpoint) => {
        const res = await fetch(`${API_BASE}${endpoint}`, { method: 'GET', headers: getHeaders() });
        return res.json();
      },
      post: async (endpoint, body) => {
        const res = await fetch(`${API_BASE}${endpoint}`, {
          method: 'POST',
          headers: getHeaders(),
          body: JSON.stringify(body)
        });
        return res.json();
      },
      put: async (endpoint, body) => {
        const res = await fetch(`${API_BASE}${endpoint}`, {
          method: 'PUT',
          headers: getHeaders(),
          body: JSON.stringify(body)
        });
        return res.json();
      },
      delete: async (endpoint) => {
        const res = await fetch(`${API_BASE}${endpoint}`, { method: 'DELETE', headers: getHeaders() });
        return res.json();
      },
      uploadFile: async (endpoint, file) => {
        const formData = new FormData();
        formData.append('file', file);
        const token = localStorage.getItem('token');
        const headers = {};
        if (token) headers['Authorization'] = `Bearer ${token}`;
        const res = await fetch(`${API_BASE}${endpoint}`, { method: 'POST', headers, body: formData });
        return res.json();
      }
    };

    // --- CONTEXT PROVIDERS ---
    const AuthContext = createContext(null);
    const AuthProvider = ({ children }) => {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const loadUser = async () => {
          const token = localStorage.getItem('token');
          if (!token) { setLoading(false); return; }
          try {
            const res = await api.get('/auth/me');
            if (res.success) setUser(res.data);
            else localStorage.removeItem('token');
          } catch (e) {
            localStorage.removeItem('token');
          } finally { setLoading(false); }
        };
        loadUser();
      }, []);

      const login = async (email, password, role) => {
        setLoading(true);
        const res = await api.post('/auth/login', { email, password, role });
        if (res.success) {
          localStorage.setItem('token', res.data.token);
          setUser(res.data);
        }
        setLoading(false);
        return res;
      };

      const register = async (name, email, password) => {
        setLoading(true);
        const res = await api.post('/auth/register', { name, email, password });
        if (res.success) {
          localStorage.setItem('token', res.data.token);
          setUser(res.data);
        }
        setLoading(false);
        return res;
      };

      const verifyEmail = async (code) => {
        const res = await api.post('/auth/verify', { code });
        if (res.success) {
          setUser(prev => prev ? { ...prev, isVerified: true } : null);
          return true;
        }
        return false;
      };

      const logout = () => {
        localStorage.removeItem('token');
        setUser(null);
      };

      return (
        <AuthContext.Provider value={{ user, loading, login, register, verifyEmail, logout }}>
          {children}
        </AuthContext.Provider>
      );
    };

    const DarkModeContext = createContext(null);
    const DarkModeProvider = ({ children }) => {
      const [darkMode, setDarkMode] = useState(() => JSON.parse(localStorage.getItem('darkMode') || 'false'));
      useEffect(() => {
        if (darkMode) document.body.classList.add('dark');
        else document.body.classList.remove('dark');
        localStorage.setItem('darkMode', JSON.stringify(darkMode));
      }, [darkMode]);
      const toggleDarkMode = () => setDarkMode(prev => !prev);
      return (
        <DarkModeContext.Provider value={{ darkMode, toggleDarkMode }}>
          {children}
        </DarkModeContext.Provider>
      );
    };

    // --- CUSTOM CANVAS CHARTS COMPONENTS ---
    const LineChart = ({ data, options }) => {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (canvasRef.current) {
          if (chartRef.current) chartRef.current.destroy();
          chartRef.current = new Chart(canvasRef.current, {
            type: 'line',
            data,
            options
          });
        }
        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [data, options]);

      return <canvas ref={canvasRef} />;
    };

    const BarChart = ({ data, options }) => {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (canvasRef.current) {
          if (chartRef.current) chartRef.current.destroy();
          chartRef.current = new Chart(canvasRef.current, {

            data,
            options
          });
        }
        return () => { if (chartRef.current) chartRef.current.destroy(); };

      const [extracting, setExtracting] = useState(false);
      const [validationWarning, setValidationWarning] = useState('');

      const handlePdfExtraction = async () => {
        if (!qPaperFile) {
          setError('Please select at least the Question Paper PDF.');
          return;
        }
        setError('');
        setSuccess('');
        setExtracting(true);

        try {
          const formData = new FormData();
          formData.append('questionPaper', qPaperFile);
          if (aKeyFile) {
            formData.append('answerKey', aKeyFile);
          }

          const token = localStorage.getItem('token');
          const headers = {};
          if (token) {
            headers['Authorization'] = `Bearer ${token}`;
          }

          const res = await fetch(`${API_BASE}/uploads/extract-exam`, {
            method: 'POST',
            headers,
            body: formData
          });

          const result = await res.json();
          if (result.success) {
            setQuestions(result.data.questions);
            if (result.data.validationWarning) {
              setValidationWarning(result.data.validationWarning);
              setError(result.data.validationWarning);
            } else {
              setValidationWarning('');
              setSuccess(`Successfully extracted ${result.data.totalQuestions} questions and matched answers!`);
            }
            setTab('questions');
          } else {
            setError(result.message || 'Failed to extract questions.');
          }

          console.error(err);
          setError('An error occurred during PDF text extraction.');

          setExtracting(false);

        setError('');
        setSuccess('');

          const res = await api.uploadFile('/uploads/questions', file);

            setQuestions([...questions, ...res.data]);
            setSuccess(`Successfully parsed ${res.count} questions from file.`);

        };

    // 10. Question Bank CRUD Manager Page
    const QuestionBank = () => {
      const [questions, setQuestions] = useState([]);

      const [subject, setSubject] = useState('');

          const params = [];
          if (subject) params.push(`subject=${subject}`);
          if (difficulty) params.push(`difficulty=${difficulty}`);
          if (search) params.push(`search=${search}`);
          if (params.length > 0) url += `?${params.join('&')}`;

          const res = await api.get(url);
          if (res.success) setQuestions(res.data);
        } catch (e) {
          console.error(e);
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => { loadQuestions(); }, [subject, difficulty]);

      const handleSearchSubmit = (e) => {
        e.preventDefault();
        loadQuestions();
      };

      const handleDelete = async (id) => {
        if (window.confirm('Delete this question from database?')) {
          try {
            const res = await api.delete(`/questions/${id}`);
            if (res.success) setQuestions(prev => prev.filter(q => q._id !== id));
          } catch (e) {
            alert('Deletion failed.');
          }

      };

      return (
        <div className="max-w-5xl mx-auto px-6 py-8 text-left font-sans">

              <Icons.Search className="absolute left-3 top-2.5 text-slate-400 w-4 h-4" />
            </form>

            <div className="flex gap-4 w-full md:w-auto">
              <select value={subject} onChange={e => setSubject(e.target.value)} className="bg-slate-50 dark:bg-slate-955 border border-slate-200 dark:border-slate-800 rounded-xl py-2 px-3 text-xs focus:outline-none dark:text-slate-100">

                <option value="Biology">Biology</option>

                <option value="">All Difficulties</option>
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>

    // 11. Exam Setup Page
    const ExamSetup = ({ testId, setView, setSelectedActiveSessionId }) => {
      const { user } = useContext(AuthContext);
      const [test, setTest] = useState(null);
      const [loading, setLoading] = useState(true);
      
      const [step, setStep] = useState(1); // 1: Permissions, 2: Selfie, 3: Aadhaar
      
      // Permissions states
      const [camChecked, setCamChecked] = useState(false);
      const [micChecked, setMicChecked] = useState(false);
      
      // Selfie states
      const [selfieUrl, setSelfieUrl] = useState('');
      const [scanning, setScanning] = useState(false);
      
      // Aadhaar states
      const [aadhaarUrl, setAadhaarUrl] = useState('');
      const [aadhaarMode, setAadhaarMode] = useState('file'); // 'file' or 'camera'
      const [aadhaarUploading, setAadhaarUploading] = useState(false);

      const [error, setError] = useState('');
      const [success, setSuccess] = useState('');
      
      const videoRef = useRef(null);
      const streamRef = useRef(null);

      useEffect(() => {
        api.get(`/tests/${testId}`).then(res => {
          if (res.success) setTest(res.data);
          setLoading(false);
        });
        return () => {
          if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
        };
      }, [testId]);

      const grantHardware = async () => {
        try {
          setError('');
          setSuccess('');
          const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
          streamRef.current = stream;
          if (videoRef.current) videoRef.current.srcObject = stream;
          setCamChecked(true);
          setMicChecked(true);
          setSuccess('Camera and Microphone permissions granted.');
          setTimeout(() => setStep(2), 800);
        } catch (e) {
          setError('Camera and Microphone access are mandatory to proceed.');
        }
      };

      const captureSelfie = async () => {
        if (!camChecked) { setError('Grant camera access first.'); return; }
        setScanning(true);
        setError('');
        setSuccess('');
        try {
          const canvas = document.createElement('canvas');
          canvas.width = videoRef.current.videoWidth || 640;
          canvas.height = videoRef.current.videoHeight || 480;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(videoRef.current, 0, 0);
          const dataUrl = canvas.toDataURL('image/jpeg');

          const res = await api.post('/uploads/verification', { imageBase64: dataUrl });
          if (res.success) {
            setSelfieUrl(res.url);
            setSuccess('Selfie captured successfully.');
          } else {
            setError('Failed to save selfie capture.');
          }
        } catch (err) {
          setError('Error capturing selfie.');
        } finally {
          setScanning(false);
        }
      };

      const handleAadhaarUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        // Validate size (max 5MB)
        if (file.size > 5 * 1024 * 1024) {
          setError('File size exceeds 5MB limit.');
          return;
        }

        setAadhaarUploading(true);
        setError('');
        setSuccess('');
        try {
          const res = await api.uploadFile('/uploads/verification', file);
          if (res.success) {
            setAadhaarUrl(res.url);
            setSuccess('Aadhaar Card front uploaded successfully.');
          } else {
            setError(res.message || 'Aadhaar upload failed.');
          }
        } catch (err) {
          setError('Error uploading Aadhaar file.');
        } finally {
          setAadhaarUploading(false);
        }
      };

      const captureAadhaar = async () => {
        if (!camChecked) { setError('Camera stream is offline.'); return; }
        setAadhaarUploading(true);
        setError('');
        setSuccess('');
        try {
          const canvas = document.createElement('canvas');
          canvas.width = videoRef.current.videoWidth || 640;
          canvas.height = videoRef.current.videoHeight || 480;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(videoRef.current, 0, 0);
          const dataUrl = canvas.toDataURL('image/jpeg');

          const res = await api.post('/uploads/verification', { imageBase64: dataUrl });
          if (res.success) {
            setAadhaarUrl(res.url);
            setSuccess('Aadhaar Card frame captured successfully.');
          } else {
            setError('Failed to capture Aadhaar image.');
          }
        } catch (err) {
          setError('Error capturing Aadhaar.');
        } finally {
          setAadhaarUploading(false);
        }
      };

      const handleLaunch = async () => {
        if (!selfieUrl || !aadhaarUrl) {
          setError('Please capture your selfie and upload your Aadhaar card to start the exam.');
          return;
        }

        try {
          const res = await api.post('/exams/start', {
            testId,
            selfieUrl,
            aadhaarUrl,
            faceMatchScore: 100,
            ocrName: user ? user.name : 'Verified Candidate',
            ocrDob: 'N/A',
            ocrAadhaar: 'N/A',
            deviceInfo: navigator.userAgent,
            browserInfo: navigator.userAgent,
            verificationStatus: 'approved'
          });
          if (res.success) {
            if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
            setSelectedActiveSessionId(res.data._id);
            setView('student-exam-portal');
          } else {
            setError(res.message);
          }
        } catch (e) {
          setError('Exam launch failed. Please retry.');
        }
      };

      if (loading) {
        return <div className="py-20 text-center text-xs text-slate-400">Loading prerequisites setup...</div>;
      }

      return (
        <div className="max-w-3xl mx-auto px-6 py-8 text-left font-sans">
          <div className="flex flex-col md:flex-row md:items-center justify-between pb-6 border-b mb-6 gap-2">
            <div>
              <h2 className="text-xl font-extrabold text-slate-800 dark:text-slate-100">Identity Verification Gateway</h2>
              <p className="text-xs text-slate-505 mt-0.5">Secure testing lobby: <strong>{test?.title}</strong></p>
            </div>
            <button onClick={() => setView('student-dashboard')} className="px-3.5 py-1.5 bg-slate-105 hover:bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-350 rounded-xl text-xs font-bold transition-all">Cancel</button>
          </div>

          {/* Progress Indicators */}
          <div className="flex justify-between items-center mb-8 bg-slate-50 dark:bg-slate-900/40 p-4 rounded-xl border border-slate-200/50 dark:border-slate-800">
            {['1. Grant Permissions', '2. Snap Selfie', '3. Upload / Snap Aadhaar'].map((sName, idx) => (
              <div key={idx} className="flex items-center">
                <div className={`w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold border ${step === idx + 1 ? 'bg-brand-500 text-white border-brand-500 shadow-sm' : step > idx + 1 ? 'bg-green-500 text-white border-green-500' : 'bg-slate-100 dark:bg-slate-800 text-slate-400 dark:text-slate-600 border-slate-200 dark:border-slate-800'}`}>
                  {step > idx + 1 ? '✓' : idx + 1}
                </div>
                <span className={`text-[10px] font-bold ml-2 hidden sm:inline ${step === idx + 1 ? 'text-slate-800 dark:text-slate-202 font-extrabold' : 'text-slate-400'}`}>{sName}</span>
                {idx < 2 && <div className={`h-0.5 w-8 sm:w-16 mx-3 ${step > idx + 1 ? 'bg-green-500' : 'bg-slate-200 dark:bg-slate-800'}`}></div>}
              </div>
            ))}
          </div>

          {error && <div className="p-3 bg-red-50 dark:bg-red-950/10 text-red-600 dark:text-red-400 text-xs font-bold rounded-xl my-4 flex items-center gap-1.5 border border-red-200/30"><Icons.Alert className="w-4 h-4" /> {error}</div>}
          {success && <div className="p-3 bg-green-50 dark:bg-green-950/10 text-green-700 dark:text-green-400 text-xs font-bold rounded-xl my-4 flex items-center gap-1.5 border border-green-200/20"><Icons.Check className="w-4 h-4" /> {success}</div>}

          <div className="bg-white dark:bg-slate-900 border border-slate-200/80 dark:border-slate-800/80 p-6 rounded-2xl shadow-sm space-y-6">
            
            {/* STEP 1: Hardware Permissions */}
            {step === 1 && (
              <div className="space-y-4">
                <h4 className="text-sm font-bold text-slate-855 dark:text-slate-105 font-extrabold">Step 1: Camera & Microphone Authorization</h4>
                <p className="text-xs text-slate-500 leading-relaxed">To start the proctored examination, please grant camera and microphone access to verify your testing workspace.</p>
                <div className="flex justify-start">
                  <button onClick={grantHardware} className="px-6 py-2.5 bg-brand-600 hover:bg-brand-700 text-white rounded-xl text-xs font-bold shadow-sm transition-all">Grant Hardware Permissions</button>
                </div>
              </div>
            )}

            {/* STEP 2: Profile Selfie Capture */}
            {step === 2 && (
              <div className="space-y-4">
                <h4 className="text-sm font-bold text-slate-855 dark:text-slate-105 font-extrabold">Step 2: Capture Live Selfie</h4>
                <p className="text-xs text-slate-500 leading-relaxed">Look directly into your webcam and take a clear selfie for the verification record.</p>
                
                <div className="max-w-md mx-auto bg-slate-900 aspect-video rounded-xl overflow-hidden relative flex items-center justify-center border">
                  {selfieUrl ? (
                    <img src={selfieUrl} alt="Selfie preview" className="w-full h-full object-cover transform -scale-x-100" />
                  ) : (
                    <video ref={videoRef} autoPlay muted className="w-full h-full object-cover transform -scale-x-100" />
                  )}
                </div>

                <div className="flex justify-center gap-3">
                  {selfieUrl ? (
                    <>
                      <button onClick={() => setSelfieUrl('')} className="px-4 py-2 border hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-xl text-xs font-bold">Retake Selfie</button>
                      <button onClick={() => setStep(3)} className="px-5 py-2 bg-brand-600 hover:bg-brand-700 text-white rounded-xl text-xs font-bold shadow-sm">Next: Aadhaar Card</button>
                    </>
                  ) : (
                    <button onClick={captureSelfie} disabled={scanning} className="px-6 py-2.5 bg-brand-500 hover:bg-brand-600 text-white rounded-xl text-xs font-bold shadow-sm">
                      {scanning ? 'Taking Snapshot...' : '📷 Capture Selfie'}
                    </button>
                  )}
                </div>
              </div>
            )}

            {/* STEP 3: Aadhaar Card Upload or Capture */}
            {step === 3 && (
              <div className="space-y-4">
                <h4 className="text-sm font-bold text-slate-855 dark:text-slate-105 font-extrabold">Step 3: Aadhaar Card (Front Side)</h4>
                <p className="text-xs text-slate-500 leading-relaxed">Please upload a front-side image of your Aadhaar card (JPG, PNG, or PDF) or hold it up to your camera to take a snap.</p>

                {aadhaarUrl ? (
                  <div className="max-w-md mx-auto border rounded-xl p-4 bg-slate-50 dark:bg-slate-950/20 text-center space-y-4">
                    <img src={aadhaarUrl} alt="Aadhaar preview" className="max-h-40 mx-auto object-contain rounded-lg border" />
                    <div className="flex gap-4">
                      <button onClick={() => setAadhaarUrl('')} className="flex-1 py-2 border hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-xl text-xs font-bold">Remove & Retake</button>
                      <button onClick={handleLaunch} className="flex-1 py-2 bg-tealbrand-600 hover:bg-tealbrand-700 text-white rounded-xl text-xs font-bold shadow-sm">🚀 Start Examination</button>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-4">
                    <div className="flex gap-2 bg-slate-100 dark:bg-slate-800 p-1 rounded-xl max-w-sm mx-auto animate-fade-in">
                      <button onClick={() => setAadhaarMode('file')} className={`flex-1 py-1 rounded-lg text-xs font-bold transition-all ${aadhaarMode === 'file' ? 'bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 shadow-sm font-extrabold' : 'text-slate-500'}`}>Upload File</button>
                      <button onClick={() => setAadhaarMode('camera')} className={`flex-1 py-1 rounded-lg text-xs font-bold transition-all ${aadhaarMode === 'camera' ? 'bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 shadow-sm font-extrabold' : 'text-slate-500'}`}>Snap from Camera</button>
                    </div>

                    {aadhaarMode === 'file' ? (
                      <div className="border-2 border-dashed rounded-xl p-6 text-center bg-slate-50/50 dark:bg-slate-955/20 border-slate-202 dark:border-slate-800 max-w-md mx-auto">
                        <Icons.Upload className="w-8 h-8 text-slate-400 mx-auto mb-2" />
                        <span className="text-xs font-bold text-slate-705 dark:text-slate-350 block mb-1">Upload Front Side</span>
                        <input type="file" accept="image/*,application/pdf" id="aadhaar-wizard-upload" className="hidden" onChange={handleAadhaarUpload} />
                        <button onClick={() => document.getElementById('aadhaar-wizard-upload').click()} className="mt-2 px-4 py-2 bg-brand-500 hover:bg-brand-600 text-white rounded-xl text-xs font-bold shadow-sm">Choose File</button>
                      </div>
                    ) : (
                      <div className="space-y-4 max-w-md mx-auto">
                        <div className="bg-slate-900 aspect-video rounded-xl overflow-hidden relative flex items-center justify-center border">
                          <video ref={videoRef} autoPlay muted className="w-full h-full object-cover transform -scale-x-100" />
                        </div>
                        <button onClick={captureAadhaar} disabled={aadhaarUploading} className="w-full py-2.5 bg-brand-500 hover:bg-brand-600 disabled:bg-slate-200 text-white rounded-xl text-xs font-bold shadow-sm">
                          {aadhaarUploading ? 'Capturing Document...' : '📷 Snap Aadhaar Card'}
                        </button>
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    };

    // 12. Exam Attempt Portal (Continuous AI Proctoring Loop)
    const ExamPortal = ({ sessionId, setView, setSelectedResultId }) => {
      const { user } = useContext(AuthContext);
      const [questions, setQuestions] = useState([]);
      const [currentIdx, setCurrentIdx] = useState(0);
      const [answers, setAnswers] = useState({});
      const [warningCount, setWarningCount] = useState(0);
      
      const [timeLeft, setTimeLeft] = useState(0);
      const [showWarningModal, setShowWarningModal] = useState(false);
      const [warningReason, setWarningReason] = useState('');
      const [disqualifiedReason, setDisqualifiedReason] = useState('');
      
      const [aiLogs, setAiLogs] = useState(['[SYSTEM] Initializing AI proctor core...', '[SYSTEM] Waiting for video buffer...']);
      const [aiStatus, setAiStatus] = useState('CALIBRATING');

      // Webcam Float Minimize state
      const [camMinimized, setCamMinimized] = useState(false);

      const videoRef = useRef(null);
      const streamRef = useRef(null);
      const socketRef = useRef(null);
      const canvasRef = useRef(null);
      const overlayCanvasRef = useRef(null);
      const proctorInterval = useRef(null);
      const cocoModelRef = useRef(null); // Cache TFJS CocoSsd model weights

      const addAiLog = (msg) => {
        const time = new Date().toLocaleTimeString();
        setAiLogs(prev => [...prev, `[${time}] ${msg}`].slice(-20));
      };

      const syncTimerWithServer = async () => {
        try {
          const sessRes = await api.get(`/exams/session/${sessionId}`);
          if (sessRes.success && sessRes.data) {
            setTimeLeft(sessRes.data.timeLeft);
            if (sessRes.data.timeLeft <= 0) {
              handleAutoSubmit();
            }
          }
        } catch (e) {
          console.error("Timer sync failed:", e);
        }
      };

      useEffect(() => {
        const init = async () => {
          try {
            const sessRes = await api.get(`/exams/session/${sessionId}`);
            if (sessRes.success) {
              setWarningCount(sessRes.data.warningCount);
              const loaded = {};
              if (sessRes.data.answers) {
                Object.entries(sessRes.data.answers).forEach(([k,v]) => { loaded[k] = v; });
              }
              setAnswers(loaded);

              const testRes = await api.get(`/tests/${sessRes.data.test._id}`);
              if (testRes.success) {
                setQuestions(testRes.data.questions);
                setTimeLeft(sessRes.data.timeLeft);
                if (sessRes.data.timeLeft <= 0) handleAutoSubmit();
              }
            }
          } catch (e) { console.error(e); }
        };
        init();

        return () => {
          if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
          if (socketRef.current) socketRef.current.disconnect();
          if (proctorInterval.current) clearInterval(proctorInterval.current);
        };
      }, [sessionId]);

      useEffect(() => {
        if (user && timeLeft > 0) {
          if (!socketRef.current) {
            socketRef.current = io(window.location.origin);
            socketRef.current.emit('join-exam', { sessionId, studentName: user.name, testTitle: 'Qualifying Exam' });
            startVideoFeed();
            initProctorAi();
          }
        }
      }, [timeLeft]);

      // Server-synchronized resilient timer ticks
      useEffect(() => {
        if (timeLeft <= 0) return;

        const clock = setInterval(() => {
          setTimeLeft(prev => {
            if (prev <= 1) {
              clearInterval(clock);
              handleAutoSubmit();
              return 0;
            }
            return prev - 1;
          });
        }, 1000);

        const timerSync = setInterval(() => {
          syncTimerWithServer();
        }, 12000); // sync remaining seconds every 12 seconds

        return () => {
          clearInterval(clock);
          clearInterval(timerSync);
        };
      }, [timeLeft]);

      // Browser Security Constraints
      useEffect(() => {
        if (timeLeft <= 0) return;

        const onTabSwitch = () => { if (document.hidden) { handleViolation('tab-switch'); addAiLog('ALERT: Focus lost! Tab switch event logged.'); } };
        const onBlur = () => { handleViolation('tab-switch'); addAiLog('ALERT: Focus lost! Focus transfer event logged.'); };
        const onFullscreenChange = () => { if (!document.fullscreenElement) { handleViolation('fullscreen-exit'); addAiLog('ALERT: Fullscreen boundary exited.'); } };
        const onKeyDown = (e) => {
          if (e.key === 'F5' || (e.ctrlKey && e.key === 'r') || e.key === 'F12' || (e.ctrlKey && e.key === 'c') || (e.ctrlKey && e.key === 'v')) {
            e.preventDefault(); handleViolation('security-block');
            addAiLog(`ALERT: Prohibited keystroke key="${e.key}" blocked.`);
          }
        };
        const onRightClick = (e) => { e.preventDefault(); handleViolation('right-click'); addAiLog('ALERT: Context menu right click blocked.'); };
        const onCopyPaste = (e) => { e.preventDefault(); handleViolation('copy-paste'); addAiLog('ALERT: Clipboard action blocked.'); };

        document.addEventListener('visibilitychange', onTabSwitch);
        window.addEventListener('blur', onBlur);
        document.addEventListener('fullscreenchange', onFullscreenChange);
        window.addEventListener('keydown', onKeyDown);
        window.addEventListener('contextmenu', onRightClick);
        document.addEventListener('copy', onCopyPaste);
        document.addEventListener('paste', onCopyPaste);

        return () => {
          document.removeEventListener('visibilitychange', onTabSwitch);
          window.removeEventListener('blur', onBlur);
          document.removeEventListener('fullscreenchange', onFullscreenChange);
          window.removeEventListener('keydown', onKeyDown);
          window.removeEventListener('contextmenu', onRightClick);
          document.removeEventListener('copy', onCopyPaste);
          document.removeEventListener('paste', onCopyPaste);
        };
      }, [timeLeft]);

      const startVideoFeed = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: true });
          streamRef.current = stream;
          if (videoRef.current) videoRef.current.srcObject = stream;
          addAiLog('SYSTEM: Camera stream synchronized.');
        } catch (e) {
          handleViolation('camera-disabled');
        }
      };

      const initProctorAi = async () => {
        try {
          if (window.cocoSsd) {
            setAiStatus('SECURED');
            addAiLog('AI-ENGINE: Loaded COCO-SSD weights. Tracking active.');
            
            if (!cocoModelRef.current) {
              cocoModelRef.current = await window.cocoSsd.load();
            }

            proctorInterval.current = setInterval(async () => {
              if (videoRef.current && videoRef.current.readyState === 4 && overlayCanvasRef.current) {
                const video = videoRef.current;
                const canvas = overlayCanvasRef.current;
                const ctx = canvas.getContext('2d');
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Use cached model weights
                const predictions = await cocoModelRef.current.detect(video);
                let persons = 0; let phone = false; let book = false;
                
                predictions.forEach(p => {
                  if (p.class === 'person') persons++;
                  if (p.class === 'cell phone') phone = true;
                  if (p.class === 'book') book = true;

                  const [x, y, w, h] = p.bbox;
                  const isViolation = p.class === 'cell phone';
                  
                  ctx.strokeStyle = isViolation ? '#ef4444' : '#10b981';
                  ctx.lineWidth = 3;
                  ctx.strokeRect(x, y, w, h);
                  
                  ctx.fillStyle = isViolation ? '#ef4444' : '#10b981';
                  ctx.font = 'bold 12px monospace';
                  ctx.fillText(`${p.class.toUpperCase()} [${Math.round(p.score * 100)}%]`, x + 5, y + 18);
                });

                if (phone) {
                  handleViolation('mobile-detected');
                  setAiStatus('WARNING');
                  addAiLog('ALERT: Prohibited cell phone detected in video telemetry.');
                } else if (persons > 1) {
                  handleViolation('multiple-faces');
                  setAiStatus('WARNING');
                  addAiLog('ALERT: Multiple face structures detected.');
                } else if (persons === 0) {
                  handleViolation('no-face');
                  setAiStatus('WARNING');
                  addAiLog('ALERT: Candidate face missing from webcam field.');
                } else if (book) {
                  handleViolation('book-detected');
                  setAiStatus('WARNING');
                  addAiLog('ALERT: Unauthorized reading material detected.');
                } else {
                  setAiStatus('SECURED');
                  addAiLog(`AI: Scan OK. Candidate centered.`);
                }
              }
            }, 2000);
          }
        } catch (e) { console.error('AI init fail', e); }
      };

      const captureFrame = () => {
        if (videoRef.current && canvasRef.current) {
          const canvas = canvasRef.current; const video = videoRef.current;
          canvas.width = 320; canvas.height = 240;
          const ctx = canvas.getContext('2d');
          ctx.translate(320, 0); ctx.scale(-1, 1);
          ctx.drawImage(video, 0, 0, 320, 240);
          return canvas.toDataURL('image/jpeg', 0.6);
        }
        return '';
      };

      const handleViolation = async (type) => {
        if (disqualifiedReason) return;
        const screenshot = captureFrame();
        try {
          const res = await api.post('/exams/violation', { sessionId, violationType: type, screenshot });
          if (res.success) {
            setWarningCount(res.warningCount);
            if (socketRef.current && user) {
              socketRef.current.emit('student-violation', { sessionId, studentName: user.name, testTitle: 'Qualifying Exam', violationType: type, warningCount: res.warningCount, screenshotUrl: screenshot });
            }
            if (res.disqualified) {
              setDisqualifiedReason(res.message);
              if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
            } else {
              setWarningReason(getWarningLabel(type));
              setShowWarningModal(true);
            }
          }
        } catch (e) { console.error(e); }
      };

      const getWarningLabel = (type) => {
        if (type === 'tab-switch') return 'WARNING: DO NOT SWITCH TABS. Exam constraints log tab transfers.';
        if (type === 'fullscreen-exit') return 'WARNING: Go back to full screen immediately.';
        if (type === 'mobile-detected') return 'PROHIBITED DEVICE: Mobile phone detected in webcam view.';
        if (type === 'multiple-faces') return 'PROCTOR ALARM: Multiple face outlines detected.';
        if (type === 'no-face') return 'PROCTOR ALARM: Candidate face missing from stream.';
        return 'WARNING: Security irregular activity logged.';
      };

      const selectOption = async (oIdx) => {
        const q = questions[currentIdx];
        const prev = answers[q._id];
        const val = prev === oIdx ? -1 : oIdx;
        const copy = { ...answers };
        if (val === -1) delete copy[q._id];
        else copy[q._id] = val;
        setAnswers(copy);

        api.post('/exams/save-answer', { sessionId, questionId: q._id, selectedOptionIndex: val });
        addAiLog(`STUDENT: Answered Q #${currentIdx+1} option ${String.fromCharCode(65+oIdx)}.`);
      };

      const handleAutoSubmit = async () => {
        try {
          const res = await api.post('/exams/submit', { sessionId });
          if (res.success) {
            setSelectedResultId(res.data._id);
            setView('result-details');
          }
        } catch (e) { setView('student-dashboard'); }
      };

      const handleManualSubmit = () => {
        if (window.confirm('Submit examination answers?')) handleAutoSubmit();
      };

      if (disqualifiedReason) {
        return (
          <div className="fixed inset-0 z-50 bg-slate-955 flex items-center justify-center text-center px-6">
            <div className="w-full max-w-sm bg-slate-900 border border-red-955 p-6 rounded-2xl">
              <span className="text-3xl block">🚨</span>
              <h3 className="text-white text-base font-bold mt-2 font-sans">Attempt Terminated</h3>
              <p className="text-[10px] text-red-400 mt-2 font-bold leading-normal">{disqualifiedReason}</p>
              <button onClick={() => setView('student-dashboard')} className="w-full mt-6 py-2 bg-red-650 text-white rounded-lg text-xs font-bold shadow-md">Return to Dashboard</button>
            </div>
          </div>
        );
      }

      const q = questions[currentIdx];
      const m = Math.floor(timeLeft / 60); const s = timeLeft % 60;
      const progressPercent = questions.length ? Math.round(((currentIdx + 1) / questions.length) * 100) : 0;

      return (
        <div className="min-h-screen bg-slate-50 dark:bg-slate-950 flex flex-col select-none relative font-sans">
          <canvas ref={canvasRef} className="hidden"/>
          
          {/* Floating Webcam Proctor Widget */}
          {camMinimized ? (
            <div className="fixed top-4 right-4 z-50 bg-green-600/90 dark:bg-green-700/90 backdrop-blur-md px-3.5 py-2 rounded-xl shadow-lg border border-green-500/30 flex items-center gap-2 text-white animate-fade-in">
              <span className="flex h-2 w-2 relative">
                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span>
                <span className="relative inline-flex rounded-full h-2 w-2 bg-white"></span>
              </span>
              <span className="text-[9px] font-extrabold tracking-wider uppercase">🟢 Monitoring Active</span>
              <button onClick={() => setCamMinimized(false)} className="text-[9px] font-bold underline ml-1 hover:text-green-100">Maximize</button>
            </div>
          ) : (
            <div className="fixed top-4 right-4 z-50 w-[180px] bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-xl p-2 text-center animate-fade-in">
              <div className="flex justify-between items-center text-[9px] text-slate-400 font-bold mb-1.5 px-1">
                <span className="bg-red-605 text-white px-1.5 py-0.5 rounded tracking-wide text-[7px]">PROCTOR🔴</span>
                <button onClick={() => setCamMinimized(true)} className="hover:text-white underline text-[8px] font-bold">Minimize</button>
              </div>
              <div className="aspect-[4/3] w-full bg-black rounded-lg overflow-hidden relative">
                <video ref={videoRef} autoPlay muted className="w-full h-full object-cover transform -scale-x-100" />
                <canvas ref={overlayCanvasRef} className="w-full h-full object-cover transform -scale-x-100 absolute inset-0 z-10" />
              </div>
              <div className="flex justify-between items-center text-[8px] text-slate-400 font-bold mt-1.5 px-1">
                <span>Warnings:</span>
                <span className="text-red-500 font-extrabold text-[9.5px]">{warningCount}/5</span>
              </div>
            </div>
          )}

          {/* Clean, distraction-free Header */}
          <header className="bg-white dark:bg-slate-905 px-6 py-4 flex justify-between items-center border-b border-slate-200/80 dark:border-slate-800/80 shadow-sm relative z-20">
            <div className="text-left space-y-1 max-w-sm">
              <span className="text-[8px] font-extrabold uppercase tracking-widest text-slate-400 block">AI Proctor Secure Mode</span>
              <h1 className="text-xs font-extrabold text-slate-800 dark:text-slate-100 font-sans tracking-wide leading-none">{test?.title || 'Qualifying Exam'}</h1>
            </div>
            
            {/* Progress bar in header */}
            <div className="hidden md:flex flex-col items-center gap-1.5 flex-1 max-w-xs px-8">
              <div className="flex justify-between w-full text-[9px] text-slate-400 font-bold">
                <span>Attempt Progress</span>
                <span>{progressPercent}%</span>
              </div>
              <div className="w-full bg-slate-100 dark:bg-slate-850 h-2 rounded-full overflow-hidden border border-slate-200/40 dark:border-slate-800/40">
                <div className="bg-brand-500 h-full rounded-full transition-all duration-300" style={{ width: `${progressPercent}%` }} />
              </div>
            </div>

            <div className="flex gap-4 items-center shrink-0">
              <div className="px-3 py-1.5 bg-slate-100 dark:bg-slate-950 text-slate-700 dark:text-slate-300 text-xs font-bold rounded-xl border border-slate-200/60 dark:border-slate-800/60 flex items-center gap-1.5"><Icons.Clock className="w-3.5 h-3.5" /> {m}:{s < 10 ? '0'+s : s}</div>
              <button onClick={handleManualSubmit} className="px-4 py-1.5 bg-red-650 hover:bg-red-700 text-white rounded-xl text-xs font-bold shadow-sm">Submit Attempt</button>
            </div>
          </header>

          {/* Centered large distraction-free Question Space */}
          <div className="flex-1 flex flex-col items-center p-6 overflow-y-auto w-full max-w-3xl mx-auto">
            <div className="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800/80 p-8 rounded-2xl flex flex-col justify-between text-left shadow-sm mt-4">
              {q ? (
                <div className="space-y-6">
                  <div className="flex justify-between border-b pb-3 mb-2 text-[10px] text-slate-400 font-bold uppercase tracking-wider">
                    <span>Question {currentIdx+1} of {questions.length}</span>
                    <span>Weight: {q.marks} Mark(s)</span>
                  </div>
                  
                  {q.category && (
                    <span className="inline-block text-[8px] font-bold px-2 py-0.5 bg-brand-50 dark:bg-brand-950/20 text-brand-700 dark:text-brand-300 border border-brand-100 rounded uppercase">{q.category}</span>
                  )}
                  
                  <h3 className="text-base sm:text-lg font-bold text-slate-850 dark:text-slate-100 leading-relaxed font-sans">{q.text}</h3>
                  
                  {q.imageUrl && (
                    <div className="mb-6 rounded-2xl overflow-hidden border max-h-64 flex justify-center bg-slate-50 dark:bg-slate-950 p-2">
                      <img src={q.imageUrl} alt="Question diagram" className="max-h-64 object-contain" />
                    </div>
                  )}

                  <div className="grid grid-cols-1 gap-3.5 pt-2">
                    {q.options.map((opt, i) => {
                      const isSel = answers[q._id] === i;
                      return (
                        <button 
                          key={i} 
                          onClick={() => selectOption(i)} 
                          className={`w-full p-4 rounded-xl border text-xs font-bold text-left flex items-center gap-3.5 transition-all ${
                            isSel 
                              ? 'bg-brand-50/40 dark:bg-brand-950/20 border-brand-500 text-brand-700 dark:text-brand-300 shadow-sm translate-x-0.5' 
                              : 'bg-white hover:bg-slate-50 dark:bg-slate-900 border-slate-200 dark:border-slate-800'
                          }`}
                        >
                          <span className={`w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold ${isSel ? 'bg-brand-500 text-white' : 'bg-slate-100 dark:bg-slate-800 text-slate-500'}`}>{String.fromCharCode(65+i)}</span>
                          <span>{opt}</span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              ) : <div className="py-12 text-center text-xs text-slate-400">Retrieving question layout...</div>}

              {/* Navigation Actions */}
              <div className="flex justify-between mt-8 border-t pt-5">
                <button onClick={() => setCurrentIdx(p => Math.max(0, p-1))} disabled={currentIdx === 0} className="px-4 py-2 bg-slate-100 hover:bg-slate-205 text-slate-700 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-750 rounded-xl text-xs font-bold disabled:opacity-40 flex items-center gap-1.5">
                  <Icons.ChevronLeft className="w-3.5 h-3.5" /> Previous Question
                </button>
                {currentIdx === questions.length - 1 ? (
                  <button onClick={handleManualSubmit} className="px-5 py-2 bg-brand-600 hover:bg-brand-700 text-white rounded-xl text-xs font-extrabold flex items-center gap-1.5 shadow-sm">
                    Submit Attempt <Icons.Check className="w-3.5 h-3.5" />
                  </button>
                ) : (
                  <button onClick={() => setCurrentIdx(p => p + 1)} className="px-5 py-2 bg-brand-600 hover:bg-brand-700 text-white rounded-xl text-xs font-extrabold flex items-center gap-1.5 shadow-sm">
                    Next Question <Icons.ChevronRight className="w-3.5 h-3.5" />
                  </button>
                )}
              </div>
            </div>
          </div>

          {showWarningModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-955/65 backdrop-blur-xs px-6">
              <div className="w-full max-w-sm bg-white dark:bg-slate-900 border border-yellow-505 p-6 rounded-2xl text-center shadow-2xl">
                <span className="text-3xl block">⚠️</span>
                <h3 className="text-slate-800 dark:text-slate-100 font-extrabold mt-2 text-xs uppercase tracking-widest font-sans">Proctor Integrity Warning</h3>
                <p className="text-[10px] text-red-500 mt-2.5 font-bold leading-normal">{warningReason}</p>
                <p className="text-[9.5px] text-slate-400 mt-2.5">Current warnings tally: {warningCount} of 5. Exceeding 5 warnings terminates exam attempt.</p>
                <button onClick={() => setShowWarningModal(false)} className="mt-5 w-full py-2.5 bg-yellow-500 hover:bg-yellow-600 text-white rounded-xl text-xs font-bold transition-all shadow">Resume Attempt</button>
              </div>
            </div>
          )}
        </div>
      );
    };

    // 13. Result Details Page (Verifiable PDF download screen)
    const ResultDetails = ({ resultId, setView }) => {
      const { user } = useContext(AuthContext);
      const [result, setResult] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        api.get(`/results/${resultId}`).then(res => {
          if (res.success) setResult(res.data);
          setLoading(false);
        });
      }, [resultId]);

      const handleDownloadPdf = () => {
        const token = localStorage.getItem('token');
        window.open(`${API_BASE}/results/${resultId}/pdf?token=${token}`, '_blank');
      };

      if (loading) {
        return <div className="py-20 text-center text-xs text-slate-400">Syncing scorecard file...</div>;
      }

      const isAdmin = user && user.role === 'admin';

      if (!isAdmin) {
        return (
          <div className="max-w-md mx-auto px-6 py-12 text-center font-sans">
            <div className="glassmorphism p-8 rounded-3xl shadow-xl border border-brand-100/30 text-left space-y-4">
              <div className="w-12 h-12 bg-green-500/10 dark:bg-green-500/20 text-green-500 rounded-2xl flex items-center justify-center text-xl font-bold">✓</div>
              <h2 className="text-lg font-extrabold text-slate-805 dark:text-slate-100">Exam Submitted Successfully</h2>
              <p className="text-xs text-slate-500 dark:text-slate-400 leading-relaxed font-bold">
                Your exam has been submitted successfully. Your results are under review. Please contact the administrator to obtain your result.
              </p>
              <button onClick={() => setView('student-dashboard')} className="w-full mt-4 py-2.5 bg-brand-600 hover:bg-brand-700 text-white rounded-xl text-xs font-bold shadow-sm">
                Return to Dashboard
              </button>
            </div>
          </div>
        );
      }

      const isPass = result?.status === 'pass';

      return (
        <div className="max-w-3xl mx-auto px-6 py-8 text-left font-sans">
          <span onClick={() => setView(result?.student?.role === 'admin' ? 'admin-dashboard' : 'student-dashboard')} className="text-xs text-slate-455 hover:text-slate-700 cursor-pointer mb-4 inline-flex items-center gap-1 font-bold">
            <Icons.ArrowLeft className="w-3.5 h-3.5" /> Back to Dashboard
          </span>
          <h2 className="text-2xl font-extrabold text-slate-800 dark:text-slate-100">Scorecard Details</h2>
          
          <div className="grid grid-cols-1 md:grid-cols-12 gap-8 mt-6">
            <div className="md:col-span-7 space-y-6">
              <div className={`p-6 border rounded-2xl text-center shadow-sm ${isPass ? 'bg-green-50 text-green-700 font-bold border-green-200/25' : 'bg-red-50 text-red-700 font-bold border-red-200/25'}`}>
                <span className="text-[10px] font-bold uppercase tracking-wider block">Status</span>
                <h3 className="text-3xl font-extrabold mt-1 tracking-tight font-sans">{isPass ? 'PASSED 🎓' : 'FAILED ❌'}</h3>
              </div>

              <div className="p-6 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl space-y-3.5 shadow-sm">
                <h4 className="text-[10px] font-bold text-slate-450 uppercase pb-2 border-b">Marks secured</h4>
                <div className="flex justify-between text-xs font-bold text-slate-655 dark:text-slate-400 py-1.5 border-b">
                  <span>Qualifying Score:</span>
                  <span className="text-slate-855 dark:text-slate-150">{result.score} / {result.totalMarksPossible} Marks</span>
                </div>
                <div className="flex justify-between text-xs font-bold text-slate-655 dark:text-slate-400 py-1.5 border-b">
                  <span>Percentage:</span>
                  <span className="text-slate-855 dark:text-slate-150">{result.percentage}%</span>
                </div>
                <div className="flex justify-between text-xs font-bold text-slate-655 dark:text-slate-400 py-1.5">
                  <span>Attempt Date:</span>
                  <span className="text-slate-855 dark:text-slate-150">{new Date(result.createdAt).toLocaleDateString()}</span>
                </div>
              </div>
            </div>

            <div className="md:col-span-5 p-5 glassmorphism rounded-2xl flex flex-col justify-between border">
              <div>
                <h4 className="text-[10px] font-bold text-slate-400 uppercase pb-2 border-b">Proctoring report</h4>
                <div className="space-y-2.5 mt-3.5 text-xs font-bold text-slate-600 dark:text-slate-400">
                  <div className="flex justify-between"><span>Warnings registered:</span><span className="text-slate-855 dark:text-slate-250 font-extrabold">{result.violationReport?.violations?.length || 0} warnings</span></div>
                </div>
              </div>
              <button onClick={handleDownloadPdf} className="w-full mt-6 py-3 bg-brand-600 hover:bg-brand-700 text-white rounded-xl text-xs font-extrabold flex justify-center items-center gap-1.5 shadow-md">
                <Icons.Download className="w-4 h-4 text-white" /> Download PDF Certificate
              </button>
            </div>
          </div>
        </div>
      );
    };

    // 14. Live Monitoring Invigilator Lobby Page
    const LiveMonitor = () => {
      const [feeds, setFeeds] = useState({});
      const [alerts, setAlerts] = useState([]);
      const socketRef = useRef(null);

      useEffect(() => {
        socketRef.current = io(window.location.origin);
        socketRef.current.emit('join-admin-lobby');

        socketRef.current.on('student-entered', (data) => {
          setFeeds(prev => ({
            ...prev,
            [data.sessionId]: { sessionId: data.sessionId, studentName: data.studentName, testTitle: data.testTitle, warningCount: 0, currentQuestionIndex: 0, timeLeft: 'Calculating...', online: true }
          }));
        });

        socketRef.current.on('proctor-update', (data) => {
          setFeeds(prev => ({
            ...prev,
            [data.sessionId]: { ...prev[data.sessionId], ...data, online: true }
          }));
        });

        socketRef.current.on('proctor-alert', (data) => {
          const alertItem = { id: Date.now(), ...data };
          setAlerts(prev => [alertItem, ...prev].slice(0, 8));

          setFeeds(prev => ({
            ...prev,
            [data.sessionId]: { ...prev[data.sessionId], warningCount: data.warningCount, latestViolation: data.violationType }
          }));
        });

        return () => { if (socketRef.current) socketRef.current.disconnect(); };
      }, []);

      const feedList = Object.values(feeds);

      return (
        <div className="max-w-6xl mx-auto px-6 py-8 text-left font-sans">
          <div className="flex items-center gap-3 mb-6">
            <span className="text-2xl text-red-500 animate-pulse">📡</span>
            <div>
              <h2 className="text-2xl font-extrabold text-slate-805 dark:text-slate-100">Live invigilator feeds Lobby</h2>
              <p className="text-xs text-slate-400 mt-0.5">WebSocket channel status: active • Active exam takers: {feedList.length}</p>
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div className="lg:col-span-8">
              <h3 className="text-xs font-bold text-slate-455 uppercase mb-4 tracking-wider">Candidate Feeds</h3>
              {feedList.length === 0 ? <div className="p-12 text-center text-xs text-slate-455 glassmorphism rounded-2xl border border-dashed">Invigilator lobbies are currently silent. Open student exam portals to start streaming.</div> : (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  {feedList.map(f => (
                    <div key={f.sessionId} className={`p-5 bg-white dark:bg-slate-900 border rounded-2xl shadow-sm hover:border-brand-200 transition-all ${f.warningCount > 3 ? 'border-red-500 animate-pulse' : 'border-slate-200 dark:border-slate-800/80'}`}>
                      <h4 className="text-xs font-extrabold text-slate-855 dark:text-slate-200">{f.studentName}</h4>
                      <span className="text-[9.5px] text-slate-400 mt-0.5 block">{f.testTitle}</span>
                      <div className="grid grid-cols-2 gap-2 mt-4 text-[9.5px] text-slate-505 font-bold border-t pt-3">
                        <div>Progress: <span className="block text-slate-855 dark:text-slate-200 mt-0.5 font-bold">Q #{f.currentQuestionIndex+1}</span></div>
                        <div>Time left: <span className="block text-slate-855 dark:text-slate-200 mt-0.5 font-bold">{isNaN(f.timeLeft) ? f.timeLeft : Math.floor(f.timeLeft/60) + ' min'}</span></div>
                      </div>
                      <div className="mt-4 flex justify-between items-center text-[10px] font-bold text-slate-500">
                        <span>Warnings issued:</span>
                        <span className="text-red-500 font-extrabold">{f.warningCount} / 5</span>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div className="lg:col-span-4 space-y-4">
              <h3 className="text-xs font-bold text-slate-455 uppercase tracking-wider">Flashing integrity alerts</h3>
              <div className="p-4 glassmorphism rounded-2xl max-h-[50vh] overflow-y-auto space-y-3 border">
                {alerts.length === 0 ? <div className="text-center py-12 text-[10px] text-slate-400">Zero active proctor alarms recorded.</div> : (
                  alerts.map(a => (
                    <div key={a.id} className="p-3 bg-red-50/50 dark:bg-red-950/20 border border-red-200/25 rounded-xl">
                      <div className="flex justify-between text-[8px] font-bold text-red-700 uppercase">
                        <span>{a.violationType.toUpperCase()}</span>
                        <span>{new Date(a.timestamp).toLocaleTimeString()}</span>
                      </div>
                      <p className="text-[10px] font-bold text-slate-800 dark:text-slate-255 mt-1">Examinee: {a.studentName}</p>
                      <span className="text-[8px] text-slate-400 mt-0.5 block">Warning: #{a.warningCount}</span>
                      {a.screenshotUrl && (
                        <div className="mt-2 aspect-video rounded-lg overflow-hidden border border-slate-200 dark:border-slate-800">
                          <img src={a.screenshotUrl} alt="Incident snapshot" className="w-full h-full object-cover transform -scale-x-100"/>
                        </div>
                      )}
                    </div>
                  ))
                )}
              </div>
            </div>
          </div>
        </div>
      );
    };

    // 15. Candidate Verification Logs (Admin only)
    const AdminVerifications = () => {
      const [sessions, setSessions] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        api.get('/exams/admin/sessions').then(res => {
          if (res.success) {
            setSessions(res.data);
          }
          setLoading(false);
        });
      }, []);

      if (loading) {
        return (
          <div className="min-h-[50vh] flex flex-col items-center justify-center">
            <div className="w-10 h-10 border-4 border-brand-500 border-t-transparent rounded-full animate-spin"></div>
            <span className="text-xs text-slate-400 mt-2 font-bold">Syncing verification logs...</span>
          </div>
        );
      }

      return (
        <div className="max-w-6xl mx-auto px-6 py-8 text-left font-sans animate-fade-in">
          <div className="mb-6 flex justify-between items-center">
            <div>
              <h2 className="text-xl font-extrabold text-slate-800 dark:text-slate-100">Candidate Identity Verifications</h2>
              <p className="text-xs text-slate-500 mt-0.5">Audit selfie photos and Aadhaar card uploads securely collected before examinations.</p>
            </div>
          </div>

          {sessions.length === 0 ? (
            <div className="p-12 text-center text-xs text-slate-400 glassmorphism rounded-2xl border border-dashed">No verification records found.</div>
          ) : (
            <div className="bg-white dark:bg-slate-900 border border-slate-205 dark:border-slate-800 rounded-2xl overflow-hidden shadow-sm">
              <table className="w-full text-xs">
                <thead className="bg-slate-50 dark:bg-slate-800/60 font-bold text-slate-500 uppercase border-b border-slate-100 dark:border-slate-800">
                  <tr>
                    <th className="px-5 py-3 text-left">Candidate Info</th>
                    <th className="px-5 py-3 text-center">Selfie Capture</th>
                    <th className="px-5 py-3 text-center">Aadhaar Front</th>
                    <th className="px-5 py-3 text-left">Exam Details</th>
                    <th className="px-5 py-3 text-center">Started</th>
                    <th className="px-5 py-3 text-center">Submitted</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-105 dark:divide-slate-800/40">
                  {sessions.map(s => (
                    <tr key={s._id} className="hover:bg-slate-50/50 dark:hover:bg-slate-800/20 transition-colors">
                      <td className="px-5 py-3.5 text-left">
                        <div className="font-bold text-slate-800 dark:text-slate-200">{s.student?.name}</div>
                        <div className="text-[10px] text-slate-400 mt-0.5">{s.student?.email}</div>
                        <div className="text-[9px] text-slate-550 font-mono mt-0.5">ID: {s.student?._id}</div>
                      </td>
                      <td className="px-5 py-3.5 text-center">
                        {s.selfieUrl ? (
                          <a href={s.selfieUrl} target="_blank" rel="noopener noreferrer">
                            <img src={s.selfieUrl} alt="Selfie" className="w-12 h-12 rounded-lg object-cover mx-auto border hover:scale-105 transition-transform cursor-pointer"/>
                          </a>
                        ) : <span className="text-slate-400">-</span>}
                      </td>
                      <td className="px-5 py-3.5 text-center">
                        {s.aadhaarUrl ? (
                          <a href={s.aadhaarUrl} target="_blank" rel="noopener noreferrer">
                            <img src={s.aadhaarUrl} alt="Aadhaar" className="w-16 h-10 rounded-md object-contain mx-auto border hover:scale-105 transition-transform cursor-pointer"/>
                          </a>
                        ) : <span className="text-slate-400">-</span>}
                      </td>
                      <td className="px-5 py-3.5 text-left font-bold text-slate-800 dark:text-slate-200">
                        {s.test?.title}
                        <span className={`block text-[9px] font-bold uppercase mt-1 ${s.status === 'submitted' ? 'text-green-500' : s.status === 'disqualified' ? 'text-red-500' : 'text-yellow-500'}`}>{s.status}</span>
                      </td>
                      <td className="px-5 py-3.5 text-center text-slate-550">{new Date(s.startTime).toLocaleString()}</td>
                      <td className="px-5 py-3.5 text-center text-slate-550">{s.endTime ? new Date(s.endTime).toLocaleString() : '-'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    };

    // --- MAIN SINGLE PAGE APPLICATION WRAPPER ---
    function App() {
      const { user, loading } = useContext(AuthContext);
      const [view, setView] = useState('landing');
      
      const [selectedTestId, setSelectedTestId] = useState(null);
      const [selectedResultId, setSelectedResultId] = useState(null);
      const [selectedActiveSessionId, setSelectedActiveSessionId] = useState(null);

      useEffect(() => {
        if (!loading) {
          if (user) {
            if (user.role === 'admin') setView('admin-dashboard');
            else if (!user.isVerified) setView('verify');
            else setView('student-dashboard');
          } else {
            setView('landing');
          }
        }
      }, [loading, user]);

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-955">
            <div className="w-10 h-10 border-4 border-brand-500 border-t-transparent rounded-full animate-spin"></div>
          </div>
        );
      }

      return (
        <div className="min-h-screen flex flex-col transition-colors duration-300">
          <Navbar currentView={view} setView={setView} />
          <div className="flex-1 bg-slate-50 dark:bg-slate-955 text-slate-900 dark:text-slate-100">
            {view === 'landing' && <LandingPage setView={setView} />}
            {view === 'login' && <LoginPage setView={setView} />}
            {view === 'register' && <RegisterPage setView={setView} />}
            {view === 'verify' && <VerificationPage setView={setView} />}
            {view === 'forgot-password' && <ForgotPasswordPage setView={setView} />}
            
            {view === 'student-dashboard' && (
              <StudentDashboard setView={setView} setSelectedTestId={setSelectedTestId} setSelectedResultId={setSelectedResultId} />
            )}
            {view === 'student-exam-setup' && (
              <ExamSetup testId={selectedTestId} setView={setView} setSelectedActiveSessionId={setSelectedActiveSessionId} />
            )}
            {view === 'student-exam-portal' && (
              <ExamPortal sessionId={selectedActiveSessionId} setView={setView} setSelectedResultId={setSelectedResultId} />
            )}
            {view === 'result-details' && (
              <ResultDetails resultId={selectedResultId} setView={setView} />
            )}

            {view === 'admin-dashboard' && (
              <AdminDashboard setView={setView} setSelectedResultId={setSelectedResultId} />
            )}
            {view === 'admin-manage-tests' && (
              <ManageTests setView={setView} />
            )}
            {view === 'admin-questions' && (
              <QuestionBank />
            )}
            {view === 'admin-live-monitor' && (
              <LiveMonitor />
            )}
            {view === 'admin-verifications' && (
              <AdminVerifications />
            )}
          </div>
        </div>
      );
    }

    const rootEl = ReactDOM.createRoot(document.getElementById('root'));
    rootEl.render(
      <React.StrictMode>
        <DarkModeProvider>
          <AuthProvider>
            <App />
          </AuthProvider>
        </DarkModeProvider>
      </React.StrictMode>
    );
  </script>
</body>
</html>
